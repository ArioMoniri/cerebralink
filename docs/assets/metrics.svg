<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="CerebraLink pipeline metrics — timings and tokens">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e28"/><stop offset="100%" stop-color="#160a2e"/></linearGradient>
    <linearGradient id="barT" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#0e7490"/><stop offset="100%" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="barS" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4338ca"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="barO" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#7e22ce"/><stop offset="100%" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#141a38"/><stop offset="100%" stop-color="#10142c"/></linearGradient>
    <style>
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
      .h{fill:#e2e8f0;font-weight:800}.l{fill:#cbd5e1;font-size:13px}.t{fill:#94a3b8;font-size:11px}.v{font-size:12px;font-weight:700}
      /* bars are full-width at rest; only a non-hiding shimmer animates (opacity stays high) */
      @keyframes shimmer{0%,100%{opacity:.82}50%{opacity:1}}
      .bar{animation:shimmer 3s ease-in-out infinite}
      .bar2{animation-delay:.4s}.bar3{animation-delay:.8s}.bar4{animation-delay:1.2s}.bar5{animation-delay:1.6s}.bar6{animation-delay:2s}
    </style>
  </defs>

  <rect width="1200" height="440" rx="20" fill="url(#mbg)"/>
  <text x="40" y="46" class="h" font-size="23">📊 Anatomy of One Query</text>
  <text x="40" y="70" class="t" font-size="13.5">Representative per-agent timings &amp; token usage. Phases ② Fetch and ③ Council run <tspan fill="#5eead4" font-weight="700">concurrently</tspan> — wall-clock ≠ the sum of bars.</text>

  <!-- ── LEFT: latency bars ── -->
  <g transform="translate(40,96)">
    <rect width="690" height="312" rx="14" fill="url(#card)" stroke="#2a3568"/>
    <text x="24" y="34" class="t" fill="#7dd3fc" font-weight="700">⏱  PER-AGENT PROCESSING TIME (s)</text>

    <!-- gridlines (scale: 8px per second, x0 = 80) -->
    <g stroke="#1e293b" stroke-width="1">
      <line x1="200" y1="52" x2="200" y2="290"/><line x1="320" y1="52" x2="320" y2="290"/>
      <line x1="440" y1="52" x2="440" y2="290"/><line x1="560" y1="52" x2="560" y2="290"/>
    </g>
    <g class="t" fill="#475569" font-size="10"><text x="200" y="306" text-anchor="middle">15s</text><text x="320" y="306" text-anchor="middle">30s</text><text x="440" y="306" text-anchor="middle">45s</text><text x="560" y="306" text-anchor="middle">60s</text></g>

    <!-- bars: base width = final value (always visible); CSS grow is enhancement -->
    <g font-size="12">
      <g transform="translate(0,64)"><text x="74" y="11" text-anchor="end" class="l">🧭 Router</text><rect class="bar"  x="80" y="0" width="28"  height="16" rx="8" fill="url(#barT)"/><text x="116" y="12" class="v" fill="#67e8f9">3.5</text></g>
      <g transform="translate(0,96)"><text x="74" y="11" text-anchor="end" class="l">🔬 Research</text><rect class="bar bar2" x="80" y="0" width="416" height="16" rx="8" fill="url(#barS)"/><text x="506" y="12" class="v" fill="#a5b4fc">52</text></g>
      <g transform="translate(0,128)"><text x="74" y="11" text-anchor="end" class="l">💊 Drug</text><rect class="bar bar3" x="80" y="0" width="480" height="16" rx="8" fill="url(#barS)"/><text x="570" y="12" class="v" fill="#a5b4fc">60</text></g>
      <g transform="translate(0,160)"><text x="74" y="11" text-anchor="end" class="l">📝 Prescription</text><rect class="bar bar4" x="80" y="0" width="200" height="16" rx="8" fill="url(#barS)"/><text x="290" y="12" class="v" fill="#a5b4fc">25</text></g>
      <g transform="translate(0,192)"><text x="74" y="11" text-anchor="end" class="l">⚡ Fast Composer</text><rect class="bar bar5" x="80" y="0" width="80"  height="16" rx="8" fill="url(#barO)"/><text x="170" y="12" class="v" fill="#d8b4fe">10</text></g>
      <g transform="translate(0,224)"><text x="74" y="11" text-anchor="end" class="l">⚖️ Trust</text><rect class="bar bar6" x="80" y="0" width="32"  height="16" rx="8" fill="url(#barT)"/><text x="120" y="12" class="v" fill="#67e8f9">4</text></g>
    </g>
  </g>

  <!-- ── RIGHT: token donut + stat ── -->
  <g transform="translate(750,96)">
    <rect width="410" height="312" rx="14" fill="url(#card)" stroke="#2a3568"/>
    <text x="24" y="34" class="t" fill="#7dd3fc" font-weight="700">🎟  TOKEN USAGE</text>

    <!-- donut (base offset = final value; SMIL sweep is enhancement) -->
    <g transform="translate(120,150)">
      <circle r="54" fill="none" stroke="#1e293b" stroke-width="18"/>
      <circle class="bar" r="54" fill="none" stroke="url(#barT)" stroke-width="18" stroke-dasharray="239 339" stroke-dashoffset="0" transform="rotate(-90)"/>
      <circle class="bar bar3" r="54" fill="none" stroke="url(#barO)" stroke-width="18" stroke-dasharray="100 339" stroke-dashoffset="0" transform="rotate(164)"/>
      <text y="-2" text-anchor="middle" class="h" font-size="22">≈26k</text>
      <text y="18" text-anchor="middle" class="t">total tokens</text>
    </g>
    <!-- legend -->
    <g transform="translate(210,110)" font-size="12">
      <rect width="13" height="13" rx="3" fill="#22d3ee"/><text x="20" y="11" class="l">Input ≈ 18.5k</text>
      <rect y="30" width="13" height="13" rx="3" fill="#c084fc"/><text x="20" y="41" class="l">Output ≈ 7.7k</text>
    </g>

    <!-- fast-answer stat -->
    <g transform="translate(24,230)">
      <rect width="362" height="58" rx="11" fill="#0d9488" fill-opacity="0.12" stroke="#0d9488" stroke-opacity="0.4"/>
      <text x="16" y="26" class="h" font-size="19" fill="#5eead4">⚡ ~10 s</text>
      <text x="112" y="22" class="l">to first answer · <tspan fill="#a5b4fc" font-weight="700">~1 min</tspan> full</text>
      <text x="112" y="42" class="t">first answer streams while the full analysis composes</text>
    </g>
  </g>
</svg>
