<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" width="1200" height="720" role="img" aria-label="CerebraLink roadmap board">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e28"/><stop offset="100%" stop-color="#160a2e"/></linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#12173a"/><stop offset="100%" stop-color="#0e1230"/></linearGradient>
    <style>
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
      .h{fill:#e2e8f0;font-weight:800}.sub{fill:#94a3b8}
      .col{font-weight:800;font-size:13px;letter-spacing:1px}
      .ct{fill:#1f2937;font-weight:700}.cd{fill:#475569}
      @keyframes pinp{0%,100%{opacity:.85}50%{opacity:1}}
      .pin{animation:pinp 2.6s ease-in-out infinite}
      @keyframes soon{0%,100%{opacity:.6}50%{opacity:1}}
      .soon{animation:soon 1.8s ease-in-out infinite}
    </style>
  </defs>

  <rect width="1200" height="720" rx="20" fill="url(#rbg)"/>
  <text x="40" y="46" class="h" font-size="23">Roadmap Board</text>
  <text x="40" y="70" class="sub" font-size="13.5">What is shipped, in flight, and on the research bench. The "Coming" column is exploratory R&amp;D, not committed dates.</text>

  <!-- board panel -->
  <rect x="32" y="88" width="1136" height="608" rx="16" fill="url(#board)" stroke="#273150"/>

  <!-- column headers -->
  <g>
    <g transform="translate(56,118)"><rect width="258" height="30" rx="8" fill="#047857" fill-opacity=".22" stroke="#10b981" stroke-opacity=".5"/><text x="14" y="20" class="col" fill="#6ee7b7">SHIPPED</text><text x="244" y="20" text-anchor="end" class="col" fill="#6ee7b7" font-size="13">✓</text></g>
    <g transform="translate(330,118)"><rect width="258" height="30" rx="8" fill="#1d4ed8" fill-opacity=".22" stroke="#60a5fa" stroke-opacity=".5"/><text x="14" y="20" class="col" fill="#93c5fd">IN PROGRESS</text></g>
    <g transform="translate(604,118)"><rect width="258" height="30" rx="8" fill="#6d28d9" fill-opacity=".22" stroke="#a78bfa" stroke-opacity=".5"/><text x="14" y="20" class="col" fill="#c4b5fd">NEXT</text></g>
    <g transform="translate(878,118)"><rect width="258" height="30" rx="8" fill="#b45309" fill-opacity=".22" stroke="#f59e0b" stroke-opacity=".5"/><text x="14" y="20" class="col" fill="#fcd34d">RESEARCHING · COMING</text></g>
  </g>

  <!-- ===== SHIPPED (green notes) ===== -->
  <g>
    <g transform="translate(185,210) rotate(-2,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a3d2e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#a7f3d0"/><circle class="pin" cx="0" cy="-32" r="5" fill="#059669"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Multi-agent SSE pipeline</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">router → council → compose → score</text></g>
    <g transform="translate(185,308) rotate(1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a3d2e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#bbf7d0"/><circle class="pin" cx="0" cy="-32" r="5" fill="#059669"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Six-axis trust scoring</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">per-answer confidence + rationale</text></g>
    <g transform="translate(185,406) rotate(-1,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a3d2e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#a7f3d0"/><circle class="pin" cx="0" cy="-32" r="5" fill="#059669"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Lab parser — 3 formats</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">horizontal · vertical · serology</text></g>
    <g transform="translate(185,504) rotate(2,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a3d2e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#bbf7d0"/><circle class="pin" cx="0" cy="-32" r="5" fill="#059669"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">FHIR R4 adapter example</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">pluggable, EHR-agnostic core</text></g>
    <g transform="translate(185,602) rotate(-1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a3d2e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#a7f3d0"/><circle class="pin" cx="0" cy="-32" r="5" fill="#059669"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Neo4j knowledge graph</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">patient ↔ report ↔ episode ↔ drug</text></g>
  </g>

  <!-- ===== IN PROGRESS (blue notes) ===== -->
  <g>
    <g transform="translate(459,210) rotate(1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a2a4d" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#bfdbfe"/><circle class="pin" cx="0" cy="-32" r="5" fill="#2563eb"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">HL7 v2 segment mapping</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">PID / PV1 / OBX → patient dict</text></g>
    <g transform="translate(459,308) rotate(-2,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a2a4d" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#a5f3fc"/><circle class="pin" cx="0" cy="-32" r="5" fill="#2563eb"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Automated test suite</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">pipeline + lab-parser fixtures</text></g>
    <g transform="translate(459,406) rotate(1,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#0a2a4d" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#bfdbfe"/><circle class="pin" cx="0" cy="-32" r="5" fill="#2563eb"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Citation link-liveness</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">verify URLs resolve pre-display</text></g>
  </g>

  <!-- ===== NEXT (violet notes) ===== -->
  <g>
    <g transform="translate(733,210) rotate(-1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#3b1d6e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#ddd6fe"/><circle class="pin" cx="0" cy="-32" r="5" fill="#7c3aed"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">EHR adapter library</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">Epic · Cerner · OpenEMR</text></g>
    <g transform="translate(733,308) rotate(2,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#3b1d6e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#fbcfe8"/><circle class="pin" cx="0" cy="-32" r="5" fill="#7c3aed"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">UI internationalization</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">multi-language interface</text></g>
    <g transform="translate(733,406) rotate(-1,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#3b1d6e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#ddd6fe"/><circle class="pin" cx="0" cy="-32" r="5" fill="#7c3aed"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Configurable trust rubrics</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">tune scoring thresholds</text></g>
    <g transform="translate(733,504) rotate(1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#3b1d6e" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#fbcfe8"/><circle class="pin" cx="0" cy="-32" r="5" fill="#7c3aed"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Prompt-cache cost cuts</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">cache shared system context</text></g>
  </g>

  <!-- ===== RESEARCHING / COMING (amber notes) ===== -->
  <g>
    <g transform="translate(1007,212) rotate(2,0,0)"><rect x="-110" y="-42" width="220" height="84" rx="5" fill="#5a3306" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-42" width="220" height="84" rx="5" fill="#fde68a"/><circle class="pin" cx="0" cy="-36" r="5" fill="#d97706"/>
      <g class="soon" transform="translate(58,-34)"><rect width="48" height="16" rx="8" fill="#dc2626"/><text x="24" y="12" text-anchor="middle" fill="#fff" font-size="9" font-weight="800">SOON</text></g>
      <text x="0" y="-10" text-anchor="middle" class="ct" font-size="13">⚡ TurboQuant inference</text><text x="0" y="8" text-anchor="middle" class="cd" font-size="10">quantized model serving for</text><text x="0" y="22" text-anchor="middle" class="cd" font-size="10">lower latency &amp; cost</text></g>
    <g transform="translate(1007,318) rotate(-2,0,0)"><rect x="-110" y="-42" width="220" height="84" rx="5" fill="#5a3306" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-42" width="220" height="84" rx="5" fill="#fed7aa"/><circle class="pin" cx="0" cy="-36" r="5" fill="#d97706"/>
      <g class="soon" transform="translate(58,-34)"><rect width="48" height="16" rx="8" fill="#dc2626"/><text x="24" y="12" text-anchor="middle" fill="#fff" font-size="9" font-weight="800">SOON</text></g>
      <text x="0" y="-10" text-anchor="middle" class="ct" font-size="13">🧠 Clinical world model</text><text x="0" y="8" text-anchor="middle" class="cd" font-size="10">learned patient-state model to</text><text x="0" y="22" text-anchor="middle" class="cd" font-size="10">simulate trajectories</text></g>
    <g transform="translate(1007,424) rotate(1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#5a3306" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#fde68a"/><circle class="pin" cx="0" cy="-32" r="5" fill="#d97706"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">On-prem / local LLM</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">self-hosted model backends</text></g>
    <g transform="translate(1007,520) rotate(-1,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#5a3306" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#fed7aa"/><circle class="pin" cx="0" cy="-32" r="5" fill="#d97706"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">DICOM / multimodal</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">imaging + report ingestion</text></g>
    <g transform="translate(1007,616) rotate(1.5,0,0)"><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#5a3306" opacity=".5" transform="translate(4,5)"/><rect x="-110" y="-38" width="220" height="76" rx="5" fill="#fde68a"/><circle class="pin" cx="0" cy="-32" r="5" fill="#d97706"/><text x="0" y="-6" text-anchor="middle" class="ct" font-size="13">Eval harness / benchmarks</text><text x="0" y="14" text-anchor="middle" class="cd" font-size="10">clinical accuracy evaluation</text></g>
  </g>

  <text x="40" y="712" class="sub" font-size="11.5" fill="#64748b">Board reflects intent, not guarantees. "Coming" items are early research; see Limitations in the README.</text>
</svg>
