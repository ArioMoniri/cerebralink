<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img" aria-label="CerebraLink trust and confidence scoring">
  <defs>
    <linearGradient id="tgbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e28"/><stop offset="100%" stop-color="#160a2e"/></linearGradient>
    <linearGradient id="radar" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#818cf8"/></linearGradient>
    <linearGradient id="tgcard" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#141a38"/><stop offset="100%" stop-color="#10142c"/></linearGradient>
    <style>
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
      .h{fill:#e2e8f0;font-weight:800}.t{fill:#94a3b8;font-size:12px}.ax{fill:#cbd5e1;font-size:12px;font-weight:600}
      .l{fill:#cbd5e1;font-size:13px}
      /* the data polygon stays clearly visible; only fill opacity breathes (never hides) */
      @keyframes breathe{0%,100%{fill-opacity:.34}50%{fill-opacity:.52}}
      .poly{animation:breathe 4s ease-in-out infinite}
      @keyframes vp{0%,100%{r:4}50%{r:5.5}}
      .vtx{animation:vp 3s ease-in-out infinite}
    </style>
  </defs>

  <rect width="1200" height="560" rx="20" fill="url(#tgbg)"/>
  <text x="40" y="46" class="h" font-size="23">Trust &amp; Confidence Scoring</text>
  <text x="40" y="70" class="t" font-size="13.5">A separate Trust agent scores every answer on six axes. Scores below threshold raise a caution banner in the UI before the answer is shown.</text>

  <!-- ===== RADAR (left) ===== -->
  <!-- grid rings -->
  <g fill="none" stroke="#273150" stroke-width="1">
    <polygon points="320,240 354.6,260 354.6,300 320,320 285.4,300 285.4,260"/>
    <polygon points="320,200 389.3,240 389.3,320 320,360 250.7,320 250.7,240"/>
    <polygon points="320,160 423.9,220 423.9,340 320,400 216.1,340 216.1,220"/>
    <polygon points="320,120 458.6,200 458.6,360 320,440 181.4,360 181.4,200" stroke="#3a4670"/>
  </g>
  <!-- axes -->
  <g stroke="#273150" stroke-width="1">
    <line x1="320" y1="280" x2="320" y2="120"/>
    <line x1="320" y1="280" x2="458.6" y2="200"/>
    <line x1="320" y1="280" x2="458.6" y2="360"/>
    <line x1="320" y1="280" x2="320" y2="440"/>
    <line x1="320" y1="280" x2="181.4" y2="360"/>
    <line x1="320" y1="280" x2="181.4" y2="200"/>
  </g>
  <!-- ring scale -->
  <text x="326" y="244" fill="#475569" font-size="9">25</text>
  <text x="326" y="204" fill="#475569" font-size="9">50</text>
  <text x="326" y="164" fill="#475569" font-size="9">75</text>
  <text x="326" y="124" fill="#475569" font-size="9">100</text>

  <!-- data polygon -->
  <polygon class="poly" points="320,139.2 448.9,205.6 436.4,347.2 320,433.6 209.1,344 196.6,208.8" fill="url(#radar)" stroke="#5eead4" stroke-width="2.5"/>
  <!-- vertices -->
  <g fill="#5eead4">
    <circle class="vtx" cx="320" cy="139.2" r="4"/>
    <circle class="vtx" cx="448.9" cy="205.6" r="4"/>
    <circle class="vtx" cx="436.4" cy="347.2" r="4"/>
    <circle class="vtx" cx="320" cy="433.6" r="4"/>
    <circle class="vtx" cx="209.1" cy="344" r="4"/>
    <circle class="vtx" cx="196.6" cy="208.8" r="4"/>
  </g>
  <!-- axis labels -->
  <text x="320" y="106" text-anchor="middle" class="ax">Evidence quality</text>
  <text x="470" y="198" class="ax">Guideline align.</text>
  <text x="470" y="372" class="ax">Clinical relevance</text>
  <text x="320" y="464" text-anchor="middle" class="ax">Safety check</text>
  <text x="170" y="372" text-anchor="end" class="ax">Source recency</text>
  <text x="170" y="198" text-anchor="end" class="ax">Completeness</text>

  <!-- ===== RIGHT PANEL ===== -->
  <g transform="translate(610,96)">
    <rect width="550" height="384" rx="14" fill="url(#tgcard)" stroke="#2a3568"/>
    <text x="26" y="36" class="t" fill="#7dd3fc" font-weight="700">SCORE BREAKDOWN  (0–100)</text>

    <g transform="translate(26,58)" font-size="13">
      <g><text y="12" class="l">Evidence quality</text><text x="498" y="12" text-anchor="end" class="h" fill="#5eead4">88</text><rect y="20" width="498" height="6" rx="3" fill="#1e293b"/><rect y="20" width="438" height="6" rx="3" fill="#5eead4"/></g>
      <g transform="translate(0,40)"><text y="12" class="l">Guideline alignment</text><text x="498" y="12" text-anchor="end" class="h" fill="#818cf8">93</text><rect y="20" width="498" height="6" rx="3" fill="#1e293b"/><rect y="20" width="463" height="6" rx="3" fill="#818cf8"/></g>
      <g transform="translate(0,80)"><text y="12" class="l">Clinical relevance</text><text x="498" y="12" text-anchor="end" class="h" fill="#a78bfa">84</text><rect y="20" width="498" height="6" rx="3" fill="#1e293b"/><rect y="20" width="418" height="6" rx="3" fill="#a78bfa"/></g>
      <g transform="translate(0,120)"><text y="12" class="l">Safety check</text><text x="498" y="12" text-anchor="end" class="h" fill="#5eead4">96</text><rect y="20" width="498" height="6" rx="3" fill="#1e293b"/><rect y="20" width="478" height="6" rx="3" fill="#5eead4"/></g>
      <g transform="translate(0,160)"><text y="12" class="l">Source recency</text><text x="498" y="12" text-anchor="end" class="h" fill="#818cf8">80</text><rect y="20" width="498" height="6" rx="3" fill="#1e293b"/><rect y="20" width="398" height="6" rx="3" fill="#818cf8"/></g>
      <g transform="translate(0,200)"><text y="12" class="l">Completeness</text><text x="498" y="12" text-anchor="end" class="h" fill="#a78bfa">89</text><rect y="20" width="498" height="6" rx="3" fill="#1e293b"/><rect y="20" width="443" height="6" rx="3" fill="#a78bfa"/></g>
    </g>

    <!-- overall -->
    <g transform="translate(26,318)">
      <rect width="498" height="48" rx="11" fill="#0d9488" fill-opacity="0.12" stroke="#0d9488" stroke-opacity="0.4"/>
      <text x="16" y="30" class="h" font-size="17" fill="#5eead4">Overall 88 / 100</text>
      <text x="180" y="22" class="l">High confidence — shown without a caution banner.</text>
      <text x="180" y="38" class="t">Each score carries a one-line rationale in the API response.</text>
    </g>
  </g>
</svg>
