<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440" role="img" aria-label="Knowledge graph and lab trends preview">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b0f2a"/><stop offset="100%" stop-color="#11082b"/></linearGradient>
    <linearGradient id="gcard" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161b3a"/><stop offset="100%" stop-color="#12152e"/></linearGradient>
    <style>@keyframes p{0%,100%{opacity:.6}50%{opacity:1}} .nd{animation:p 3s ease-in-out infinite} .n2{animation-delay:.6s}.n3{animation-delay:1.2s}.n4{animation-delay:1.8s} text{font-family:Segoe UI,Helvetica,Arial,sans-serif}</style>
  </defs>
  <rect width="640" height="440" rx="16" fill="url(#gbg)"/>
  <text x="28" y="40" fill="#e2e8f0" font-size="18" font-weight="800">🕸️ Knowledge Graph &amp; 📈 Trends</text>

  <!-- graph card -->
  <g transform="translate(28,60)">
    <rect width="360" height="350" rx="14" fill="url(#gcard)" stroke="#2a3568"/>
    <g fill="none" stroke="#5eead4" stroke-opacity=".4" stroke-width="1.5">
      <line x1="180" y1="175" x2="80"  y2="80"/>
      <line x1="180" y1="175" x2="300" y2="90"/>
      <line x1="180" y1="175" x2="70"  y2="270"/>
      <line x1="180" y1="175" x2="300" y2="265"/>
      <line x1="300" y1="90"  x2="300" y2="265"/>
    </g>
    <!-- center patient -->
    <g transform="translate(180,175)"><circle r="34" fill="#4f46e5"/><text text-anchor="middle" y="-2" fill="#fff" font-size="11" font-weight="700">Patient</text><text text-anchor="middle" y="14" fill="#c7d2fe" font-size="10">64F</text></g>
    <!-- satellites -->
    <g class="nd"    transform="translate(80,80)"><circle r="26" fill="#0d9488"/><text text-anchor="middle" y="4" fill="#ccfbf1" font-size="10" font-weight="700">Episode</text></g>
    <g class="nd n2" transform="translate(300,90)"><circle r="26" fill="#9333ea"/><text text-anchor="middle" y="4" fill="#f3e8ff" font-size="10" font-weight="700">Report</text></g>
    <g class="nd n3" transform="translate(70,270)"><circle r="26" fill="#0e7490"/><text text-anchor="middle" y="4" fill="#cffafe" font-size="10" font-weight="700">Dx I20.9</text></g>
    <g class="nd n4" transform="translate(300,265)"><circle r="26" fill="#7c3aed"/><text text-anchor="middle" y="4" fill="#ede9fe" font-size="10" font-weight="700">Atenolol</text></g>
  </g>

  <!-- trend card -->
  <g transform="translate(404,60)">
    <rect width="208" height="350" rx="14" fill="url(#gcard)" stroke="#2a3568"/>
    <text x="18" y="28" fill="#94a3b8" font-size="12" font-weight="700">ALT (U/L) trend</text>
    <!-- axes -->
    <g transform="translate(20,44)" stroke="#334155"><line x1="0" y1="0" x2="0" y2="160"/><line x1="0" y1="160" x2="170" y2="160"/></g>
    <!-- ref band -->
    <rect x="20" y="150" width="170" height="40" fill="#22c55e" fill-opacity=".08"/>
    <!-- line -->
    <polyline points="24,150 60,120 96,128 132,70 168,52" fill="none" stroke="#5eead4" stroke-width="2.5"/>
    <g fill="#5eead4"><circle cx="24" cy="150" r="3"/><circle cx="60" cy="120" r="3"/><circle cx="96" cy="128" r="3"/><circle cx="132" cy="70" r="3"/></g>
    <circle cx="168" cy="52" r="4" fill="#ef4444"/><text x="150" y="44" fill="#fca5a5" font-size="10" font-weight="700">↑ high</text>
    <text x="18" y="234" fill="#cbd5e1" font-size="11">Latest: <tspan fill="#ef4444" font-weight="700">68 U/L</tspan> (ref 7–56)</text>
    <text x="18" y="256" fill="#94a3b8" font-size="11">Flagged abnormal by lab_parser</text>
    <g transform="translate(18,278)"><rect width="172" height="50" rx="10" fill="#0f172a" stroke="#334155"/><text x="12" y="22" fill="#94a3b8" font-size="11">Parsed from serology +</text><text x="12" y="40" fill="#94a3b8" font-size="11">biochemistry reports 🧫</text></g>
  </g>
</svg>
