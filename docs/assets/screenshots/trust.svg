      <g transform="translate(0,84)"><text y="10" fill="#cbd5e1">Clinical relevance</text><rect y="18" width="260" height="10" rx="5" fill="#1e293b"/><rect y="18" width="218" height="10" rx="5" fill="#c084fc"/><text x="266" y="27" fill="#d8b4fe" font-weight="700">84</text></g>
      <g transform="translate(0,126)"><text y="10" fill="#cbd5e1">Safety check</text><rect y="18" width="260" height="10" rx="5" fill="#1e293b"/><rect y="18" width="250" height="10" rx="5" fill="#5eead4"/><text x="266" y="27" fill="#5eead4" font-weight="700">96</text></g>
      <g transform="translate(0,168)"><text y="10" fill="#cbd5e1">Source recency</text><rect y="18" width="260" height="10" rx="5" fill="#1e293b"/><rect y="18" width="208" height="10" rx="5" fill="#818cf8"/><text x="266" y="27" fill="#a5b4fc" font-weight="700">80</text></g>
