    <linearGradient id="tcard" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161b3a"/><stop offset="100%" stop-color="#12152e"/></linearGradient>
    <style>text{font-family:Segoe UI,Helvetica,Arial,sans-serif}</style>
