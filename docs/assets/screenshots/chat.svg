<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440" role="img" aria-label="CerebraLink chat view preview">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b0f2a"/><stop offset="100%" stop-color="#11082b"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161b3a"/><stop offset="100%" stop-color="#12152e"/></linearGradient>
    <style>@keyframes b{0%,100%{opacity:.5}50%{opacity:1}} .live{animation:b 2s ease-in-out infinite} text{font-family:Segoe UI,Helvetica,Arial,sans-serif}</style>
  </defs>
  <rect width="640" height="440" rx="16" fill="url(#cbg)"/>
  <!-- window dots -->
  <circle cx="24" cy="24" r="5" fill="#ef4444"/><circle cx="42" cy="24" r="5" fill="#f59e0b"/><circle cx="60" cy="24" r="5" fill="#22c55e"/>
  <text x="320" y="28" text-anchor="middle" fill="#64748b" font-size="12">CerebraLink — localhost:3100</text>

  <!-- user bubble -->
  <g transform="translate(330,54)">
    <rect width="280" height="38" rx="12" fill="#0d9488" fill-opacity="0.22" stroke="#0d9488" stroke-opacity="0.5"/>
    <text x="16" y="24" fill="#99f6e4" font-size="13">Paracetamol dosing in hepatic impairment?</text>
  </g>

  <!-- assistant card -->
  <g transform="translate(28,108)">
    <rect width="584" height="232" rx="14" fill="url(#card)" stroke="#2a3568"/>
    <!-- tabs -->
    <g transform="translate(16,14)" font-size="12" font-weight="700">
      <rect width="78" height="28" rx="8" fill="#4f46e5"/><text x="39" y="19" text-anchor="middle" fill="#fff">⚡ Fast</text>
      <rect x="86" width="80" height="28" rx="8" fill="#1e2348"/><text x="126" y="19" text-anchor="middle" fill="#94a3b8">📚 Full</text>
      <rect x="174" width="104" height="28" rx="8" fill="#1e2348"/><text x="226" y="19" text-anchor="middle" fill="#94a3b8">✨ Highlights</text>
      <g class="live" transform="translate(470,4)"><circle r="4" cy="10" fill="#5eead4"/><text x="12" y="14" fill="#5eead4" font-weight="600">streaming</text></g>
    </g>
    <!-- answer lines -->
    <g transform="translate(16,58)" fill="#cbd5e1" font-size="12.5">
      <text y="0" font-weight="700" fill="#e2e8f0">Paracetamol (Acetaminophen) — hepatic impairment</text>
      <rect y="14" width="540" height="9" rx="4" fill="#334155"/>
      <rect y="32" width="500" height="9" rx="4" fill="#334155"/>
      <text y="62" fill="#f8fafc">• Max <tspan fill="#5eead4" font-weight="700">2000 mg/day</tspan> in significant hepatic impairment <tspan fill="#a5b4fc">[1][3]</tspan></text>
      <text y="84" fill="#f8fafc">• Avoid in severe / decompensated liver disease <tspan fill="#a5b4fc">[2]</tspan></text>
      <rect y="98" width="470" height="9" rx="4" fill="#334155"/>
    </g>
    <!-- citation chips -->
    <g transform="translate(16,184)" font-size="11">
      <rect width="150" height="24" rx="12" fill="#818cf8" fill-opacity=".14" stroke="#818cf8" stroke-opacity=".5"/><text x="12" y="16" fill="#a5b4fc">[1] NHS Scotland 2025</text>
      <rect x="160" width="150" height="24" rx="12" fill="#818cf8" fill-opacity=".14" stroke="#818cf8" stroke-opacity=".5"/><text x="172" y="16" fill="#a5b4fc">[2] EASL Guideline</text>
      <rect x="320" width="130" height="24" rx="12" fill="#818cf8" fill-opacity=".14" stroke="#818cf8" stroke-opacity=".5"/><text x="332" y="16" fill="#a5b4fc">[3] FDA Label</text>
    </g>
  </g>

  <!-- agent status rail -->
  <g transform="translate(28,356)" font-size="11" font-weight="600">
    <text y="0" fill="#64748b">COUNCIL</text>
    <g transform="translate(0,10)">
      <rect width="96"  height="26" rx="13" fill="#0e7490" fill-opacity=".2" stroke="#0e7490"/><text x="48" y="17" text-anchor="middle" fill="#67e8f9">🧭 Router ✓</text>
      <rect x="104" width="104" height="26" rx="13" fill="#4f46e5" fill-opacity=".2" stroke="#4f46e5"/><text x="156" y="17" text-anchor="middle" fill="#a5b4fc">🔬 Research ✓</text>
      <rect x="216" width="84"  height="26" rx="13" fill="#4f46e5" fill-opacity=".2" stroke="#4f46e5"/><text x="258" y="17" text-anchor="middle" fill="#a5b4fc">💊 Drug ✓</text>
      <rect x="308" width="96"  height="26" rx="13" fill="#9333ea" fill-opacity=".2" stroke="#9333ea"/><text x="356" y="17" text-anchor="middle" fill="#d8b4fe">🩺 Clinical ✓</text>
      <rect x="412" width="92"  height="26" rx="13" fill="#0d9488" fill-opacity=".2" stroke="#0d9488"/><text x="458" y="17" text-anchor="middle" fill="#5eead4">⚖️ Trust ✓</text>
    </g>
  </g>
</svg>
