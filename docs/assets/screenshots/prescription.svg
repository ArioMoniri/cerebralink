<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 440" width="640" height="440" role="img" aria-label="Prescription card with searchable brand picker preview">
  <defs>
    <linearGradient id="pcbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0b0f2a"/><stop offset="100%" stop-color="#11082b"/></linearGradient>
    <linearGradient id="pcard" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#161b3a"/><stop offset="100%" stop-color="#12152e"/></linearGradient>
    <style>text{font-family:Segoe UI,Helvetica,Arial,sans-serif}</style>
  </defs>
  <rect width="640" height="440" rx="16" fill="url(#pcbg)"/>
  <text x="28" y="40" fill="#e2e8f0" font-size="18" font-weight="800">📝 Prescription</text>
  <g transform="translate(470,22)"><rect width="142" height="30" rx="15" fill="#0d9488"/><text x="71" y="20" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">📋 Copy Rx</text></g>

  <!-- Rx card -->
  <g transform="translate(28,60)">
    <rect width="584" height="350" rx="14" fill="url(#pcard)" stroke="#2a3568"/>

    <!-- ingredient 1 -->
    <g transform="translate(20,20)">
      <text y="0" fill="#f8fafc" font-size="14" font-weight="700">1 · Acetaminophen <tspan fill="#64748b" font-weight="400">— ATC N02BE01</tspan></text>
      <text y="20" fill="#94a3b8" font-size="12">500–1000 mg PO q6h · max 2000 mg/day (hepatic)</text>
      <!-- searchable dropdown -->
      <g transform="translate(0,32)">
        <rect width="320" height="34" rx="9" fill="#0f172a" stroke="#4f46e5"/>
        <text x="12" y="22" fill="#e2e8f0" font-size="12.5">🔎 tylen</text>
        <text x="300" y="22" fill="#818cf8" font-size="12">▾</text>
      </g>
      <g transform="translate(0,70)" font-size="12">
        <rect width="320" height="92" rx="10" fill="#0d1230" stroke="#2a3568"/>
        <rect x="6" y="6" width="308" height="26" rx="7" fill="#4f46e5" fill-opacity=".25"/><text x="14" y="24" fill="#c7d2fe" font-weight="700">Tylenol 500 mg ✓</text>
        <text x="14" y="52" fill="#94a3b8">Parol 500 mg</text>
        <text x="14" y="76" fill="#94a3b8">Tamol 500 mg</text>
      </g>
    </g>

    <!-- ingredient 2 -->
    <g transform="translate(330,20)">
      <text y="0" fill="#f8fafc" font-size="14" font-weight="700">2 · Pantoprazole <tspan fill="#64748b" font-weight="400">— A02BC02</tspan></text>
      <text y="20" fill="#94a3b8" font-size="12">40 mg PO once daily · GI protection</text>
      <g transform="translate(0,32)">
        <rect width="234" height="34" rx="9" fill="#0f172a" stroke="#334155"/>
        <text x="12" y="22" fill="#e2e8f0" font-size="12.5">Pantpas 40 mg</text>
        <text x="214" y="22" fill="#818cf8" font-size="12">▾</text>
      </g>
    </g>

    <!-- warnings -->
    <g transform="translate(20,250)">
      <rect width="544" height="80" rx="10" fill="#7f1d1d" fill-opacity=".18" stroke="#ef4444" stroke-opacity=".4"/>
      <text x="14" y="24" fill="#fca5a5" font-size="12.5" font-weight="700">⚠️ BLACK BOX — Hepatotoxicity</text>
      <text x="14" y="44" fill="#fecaca" font-size="11.5">Do not exceed total daily APAP from ALL sources. Avoid in severe liver disease.</text>
      <text x="14" y="62" fill="#fecaca" font-size="11.5">Overdose antidote: N-Acetylcysteine (NAC).</text>
    </g>
  </g>
</svg>
