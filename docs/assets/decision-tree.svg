<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" width="1200" height="580" role="img" aria-label="CerebraLink clinical reasoning decision tree">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e28"/><stop offset="100%" stop-color="#160a2e"/></linearGradient>
    <linearGradient id="root" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0d9488"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="dec"  x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#4f46e5"/><stop offset="100%" stop-color="#4338ca"/></linearGradient>
    <linearGradient id="warn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#b45309"/><stop offset="100%" stop-color="#92400e"/></linearGradient>
    <linearGradient id="ok"   x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#047857"/><stop offset="100%" stop-color="#065f46"/></linearGradient>
    <style>
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
      .h{fill:#e2e8f0;font-weight:800}.t{fill:#94a3b8;font-size:12px}
      .nt{fill:#f1f5f9;font-weight:700}.ns{fill:#cbd5e1}
      .yes{fill:#fbbf24;font-size:11px;font-weight:700}.no{fill:#5eead4;font-size:11px;font-weight:700}
      /* solid edges are always visible; a dashed overlay flows along the recommended path */
      @keyframes flow{to{stroke-dashoffset:-28}}
      .flowpath{stroke-dasharray:6 8;animation:flow 1.3s linear infinite}
      @keyframes breathe{0%,100%{opacity:.9}50%{opacity:1}}
      .pulse{animation:breathe 3s ease-in-out infinite}
    </style>
  </defs>

  <rect width="1200" height="580" rx="20" fill="url(#dbg)"/>
  <text x="40" y="46" class="h" font-size="23">Clinical Reasoning Tree</text>
  <text x="40" y="70" class="t" font-size="13.5">How the Clinical + Drug agents derive a recommendation. The app renders this as an interactive React-Flow graph; the highlighted path is the standard healthy-adult route.</text>

  <!-- ===== EDGES (solid base, behind nodes) ===== -->
  <g fill="none" stroke="#334155" stroke-width="2.5">
    <path d="M600,120 V176"/>                        <!-- root -> D1 -->
    <path d="M540,236 C420,270 300,272 235,300"/>    <!-- D1 -> Leaf1 (Yes) -->
    <path d="M660,236 C700,262 700,272 710,300"/>    <!-- D1 -> D2 (No) -->
    <path d="M650,360 C600,392 600,402 590,430"/>    <!-- D2 -> Leaf2 (Yes) -->
    <path d="M770,360 C840,392 850,402 875,430"/>    <!-- D2 -> Leaf3 (No) -->
  </g>
  <!-- recommended path overlay (root -> D1 -> D2 -> Leaf3) -->
  <g fill="none" stroke="#5eead4" stroke-width="2.5" opacity="0.9">
    <path class="flowpath" d="M600,120 V176"/>
    <path class="flowpath" d="M660,236 C700,262 700,272 710,300"/>
    <path class="flowpath" d="M770,360 C840,392 850,402 875,430"/>
  </g>

  <!-- edge labels -->
  <text x="372" y="266" class="yes" text-anchor="middle">YES</text>
  <text x="690" y="262" class="no"  text-anchor="middle">NO</text>
  <text x="568" y="396" class="yes" text-anchor="middle">YES</text>
  <text x="838" y="392" class="no"  text-anchor="middle">NO</text>

  <!-- ===== NODES ===== -->
  <!-- root -->
  <g transform="translate(470,64)">
    <rect width="260" height="56" rx="13" fill="url(#root)"/>
    <text x="130" y="26" text-anchor="middle" class="nt" font-size="14">Adult paracetamol dosing</text>
    <text x="130" y="44" text-anchor="middle" class="ns" font-size="11">query enters the council</text>
  </g>

  <!-- D1 decision -->
  <g transform="translate(440,176)">
    <rect width="320" height="60" rx="13" fill="url(#dec)"/>
    <text x="160" y="25" text-anchor="middle" class="nt" font-size="13.5">Hepatic impairment or</text>
    <text x="160" y="44" text-anchor="middle" class="nt" font-size="13.5">chronic alcohol use?</text>
  </g>

  <!-- Leaf1 (Yes -> caution) -->
  <g class="pulse" transform="translate(70,300)">
    <rect width="230" height="84" rx="13" fill="url(#warn)"/>
    <text x="115" y="26" text-anchor="middle" class="nt" font-size="14">&#8804; 2 g / day</text>
    <text x="115" y="48" text-anchor="middle" class="ns" font-size="11.5">avoid in severe / decompensated</text>
    <text x="115" y="65" text-anchor="middle" class="ns" font-size="11.5">liver disease</text>
  </g>

  <!-- D2 decision -->
  <g transform="translate(560,300)">
    <rect width="300" height="60" rx="13" fill="url(#dec)"/>
    <text x="150" y="25" text-anchor="middle" class="nt" font-size="13.5">Age &#8805; 65 or</text>
    <text x="150" y="44" text-anchor="middle" class="nt" font-size="13.5">body weight &lt; 50 kg?</text>
  </g>

  <!-- Leaf2 (Yes -> reduced) -->
  <g class="pulse" transform="translate(470,430)">
    <rect width="230" height="84" rx="13" fill="url(#warn)"/>
    <text x="115" y="26" text-anchor="middle" class="nt" font-size="14">&#8804; 3 g / day</text>
    <text x="115" y="48" text-anchor="middle" class="ns" font-size="11.5">15 mg/kg/dose if</text>
    <text x="115" y="65" text-anchor="middle" class="ns" font-size="11.5">body weight &lt; 50 kg</text>
  </g>

  <!-- Leaf3 (No -> standard, recommended) -->
  <g class="pulse" transform="translate(760,430)">
    <rect width="240" height="84" rx="13" fill="url(#ok)" stroke="#5eead4" stroke-opacity="0.6"/>
    <text x="120" y="26" text-anchor="middle" class="nt" font-size="14">1 g every 6 h</text>
    <text x="120" y="48" text-anchor="middle" class="ns" font-size="11.5">max 4 g / day</text>
    <text x="120" y="65" text-anchor="middle" class="ns" font-size="11.5">standard healthy adult</text>
  </g>

  <!-- footer -->
  <text x="40" y="556" class="t" font-size="12.5">Every leaf is grounded in cited guidelines; the Trust agent scores the path before it is shown. Branches and thresholds are produced per query, not hard-coded.</text>
</svg>
