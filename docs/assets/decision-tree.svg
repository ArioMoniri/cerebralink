<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 614" width="1200" height="614" role="img" aria-label="CerebraLink clinical reasoning decision tree">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:'Segoe UI',-apple-system,Helvetica,Arial,sans-serif}
      .mono{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace}
      .ink{fill:#1F2328}.muted{fill:#6B6A66}
      .s{fill:none;stroke:#1F2328;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .hair{fill:none;stroke:#CFC7B6;stroke-width:1;vector-effect:non-scaling-stroke}
      .nt{fill:#1F2328;font-weight:600}
      .ns{fill:#6B6A66}
      .num{fill:#1F2328;font-weight:600}
      .yes{fill:#6B6A66;font-weight:700;letter-spacing:0.5px}
    </style>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <circle cx="0.6" cy="0.6" r="0.32" fill="#1F2328" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- warm paper ground + grain + editorial double frame -->
  <rect x="0" y="0" width="1200" height="614" fill="#FBF8F1"/>
  <rect x="0" y="0" width="1200" height="614" fill="url(#grain)"/>
  <rect x="12.5" y="12.5" width="1175" height="589" fill="none" stroke="#E3DDD0"/>
  <rect x="18.5" y="18.5" width="1163" height="577" fill="none" stroke="#E8E2D5"/>

  <!-- ===== MASTHEAD ===== -->
  <text x="44" y="50" class="sans muted" font-size="11" letter-spacing="3">CLINICAL REASONING</text>
  <text x="44" y="80" class="serif ink" font-size="26" font-weight="700">Clinical Reasoning Tree</text>
  <text x="44" y="104" class="sans muted" font-size="13">How the Clinical + Drug agents derive a recommendation. The app renders this as an interactive React-Flow graph; the <tspan class="ink" font-weight="700" font-style="italic">highlighted path</tspan> is the standard healthy-adult route.</text>
  <line class="hair" x1="44" y1="120" x2="1156" y2="120"/>

  <!-- faint chart-margin rule near the left -->
  <line class="hair" x1="28" y1="214" x2="28" y2="556"/>

  <g transform="translate(0,66)">
  <!-- ===== EDGES (1.5px ink connectors, behind nodes) ===== -->
  <g class="s" stroke="#1F2328" stroke-width="1.5">
    <path d="M540,236 C420,270 300,272 235,300"/>    <!-- D1 -> Leaf1 (Yes) -->
    <path d="M650,360 C600,392 600,402 590,430"/>    <!-- D2 -> Leaf2 (Yes) -->
  </g>

  <!-- recommended path: root -> D1 -> D2 -> Leaf3 (accent teal, static) -->
  <path class="s" style="stroke:#0E7C86" stroke-width="2.25" d="M600,120 V176"/>                     <!-- root -> D1 -->
  <path class="s" style="stroke:#0E7C86" stroke-width="2.25" d="M660,236 C700,262 700,272 710,300"/> <!-- D1 -> D2 (No) -->
  <path class="s" style="stroke:#0E7C86" stroke-width="2.25" d="M770,360 C840,392 850,402 875,430"/> <!-- D2 -> Leaf3 (No, recommended) -->

  <!-- open chevrons on connectors (ink for non-recommended, teal for recommended) -->
  <!-- D1 -> Leaf1 (Yes) chevron -->
  <path class="s" stroke="#1F2328" stroke-width="1.5" d="M243,294 l-9,7 l3,10"/>
  <!-- D2 -> Leaf2 (Yes) chevron -->
  <path class="s" stroke="#1F2328" stroke-width="1.5" d="M598,424 l-9,7 l1,11"/>
  <!-- recommended chevrons (teal) -->
  <path class="s" style="stroke:#0E7C86" stroke-width="2.25" d="M593,170 l7,8 l7,-8"/>
  <path class="s" style="stroke:#0E7C86" stroke-width="2.25" d="M702,294 l9,7 l-2,11"/>
  <path class="s" style="stroke:#0E7C86" stroke-width="2.25" d="M866,424 l11,7 l-2,-11"/>

  <!-- edge labels (ink-muted NO/YES) -->
  <text x="372" y="266" class="sans yes" font-size="11" text-anchor="middle">YES</text>
  <text x="694" y="262" class="sans muted" font-size="11" font-weight="700" letter-spacing="0.5" text-anchor="middle">NO</text>
  <text x="568" y="396" class="sans yes" font-size="11" text-anchor="middle">YES</text>
  <text x="842" y="392" class="sans muted" font-size="11" font-weight="700" letter-spacing="0.5" text-anchor="middle">NO</text>

  <!-- ===== NODES ===== -->
  <!-- root (entry node; teal accent = active/recommended start; floats) -->
  <g transform="translate(470,64)">
    <rect x="2" y="6" width="260" height="56" rx="14" fill="#1F2328" opacity="0.04"/>
    <rect x="1" y="3" width="260" height="56" rx="14" fill="#1F2328" opacity="0.05"/>
    <rect class="s" x="0.75" y="0.75" width="258.5" height="54.5" rx="14" fill="#FFFFFF" style="stroke:#0E7C86" stroke-width="2.25"/>
    <!-- clipboard / chart-of-entry glyph (teal = the one rationed concept: recommended route) -->
    <g class="s" style="stroke:#0E7C86" stroke-width="1.6" transform="translate(20,18)">
      <rect x="0" y="2" width="16" height="19" rx="2.4"/>
      <path d="M5,2 V-1 a3,3 0 0 1 6,0 V2 Z"/>
      <path d="M4,9 H12 M4,13 H12 M4,17 H9"/>
    </g>
    <text x="138" y="26" text-anchor="middle" class="sans nt" font-size="14">Adult paracetamol dosing</text>
    <text x="138" y="44" text-anchor="middle" class="sans ns" font-size="11">query enters the council</text>
  </g>

  <!-- D1 decision — hepatic-impairment node (liver/organ glyph) -->
  <g transform="translate(440,176)">
    <rect x="2" y="6" width="320" height="60" rx="14" fill="#1F2328" opacity="0.04"/>
    <rect x="1" y="3" width="320" height="60" rx="14" fill="#1F2328" opacity="0.05"/>
    <rect class="s" x="0.75" y="0.75" width="318.5" height="58.5" rx="14" fill="#FFFFFF" stroke="#1F2328" stroke-width="2.25"/>
    <!-- single-line liver glyph -->
    <g class="s" stroke-width="1.6" transform="translate(22,16)">
      <path d="M0,4 C0,-1 6,-3 12,-2 C18,-1 26,-2 28,3 C29,11 22,18 12,17 C5,16 0,11 0,4 Z"/>
      <path d="M11,-1 C13,3 12,8 9,11"/>
    </g>
    <text x="172" y="25" text-anchor="middle" class="sans nt" font-size="13.5">Hepatic impairment or</text>
    <text x="172" y="44" text-anchor="middle" class="sans nt" font-size="13.5">chronic alcohol use?</text>
  </g>

  <!-- Leaf1 (Yes -> caution; rationed alert clay outline + 14% wash; floats) -->
  <g transform="translate(70,300)">
    <rect x="2" y="6" width="230" height="84" rx="14" fill="#1F2328" opacity="0.04"/>
    <rect x="1" y="3" width="230" height="84" rx="14" fill="#1F2328" opacity="0.05"/>
    <rect x="0.75" y="0.75" width="228.5" height="82.5" rx="14" fill="#F2DED2" fill-opacity="0.55" stroke="#B5562B" stroke-width="2.25" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
    <!-- bespoke single-line caution glyph (triangle + bang) -->
    <g class="s" style="stroke:#B5562B" stroke-width="1.5" transform="translate(16,14)">
      <path d="M9,0 L18,16 L0,16 Z"/>
      <line x1="9" y1="5" x2="9" y2="10"/>
      <circle cx="9" cy="13" r="0.6" fill="#B5562B" stroke="none"/>
    </g>
    <text x="120" y="26" text-anchor="middle" class="sans num" font-size="14"><tspan class="mono" fill="#B5562B">&#8804; 2 g / day</tspan></text>
    <text x="115" y="48" text-anchor="middle" class="sans ns" font-size="11.5">avoid in severe / decompensated</text>
    <text x="115" y="65" text-anchor="middle" class="sans ns" font-size="11.5">liver disease</text>
  </g>

  <!-- D2 decision — age/weight node (balance-scale glyph) -->
  <g transform="translate(560,300)">
    <rect x="2" y="6" width="300" height="60" rx="14" fill="#1F2328" opacity="0.04"/>
    <rect x="1" y="3" width="300" height="60" rx="14" fill="#1F2328" opacity="0.05"/>
    <rect class="s" x="0.75" y="0.75" width="298.5" height="58.5" rx="14" fill="#FFFFFF" stroke="#1F2328" stroke-width="2.25"/>
    <!-- single-line balance-scale glyph -->
    <g class="s" stroke-width="1.6" transform="translate(20,15)">
      <path d="M14,1 V21"/>
      <path d="M6,22 H22"/>
      <path d="M2,4 H26"/>
      <circle cx="14" cy="2" r="1.3" fill="#1F2328" stroke="none"/>
      <path d="M2,4 L-2,12 a5,4 0 0 0 8,0 Z"/>
      <path d="M26,4 L22,12 a5,4 0 0 0 8,0 Z"/>
    </g>
    <text x="166" y="25" text-anchor="middle" class="sans nt" font-size="13.5">Age &#8805; 65 or</text>
    <text x="166" y="44" text-anchor="middle" class="sans nt" font-size="13.5">body weight &lt; 50 kg?</text>
  </g>

  <!-- Leaf2 (Yes -> reduced; ink outline, mono number; capsule dose glyph; floats) -->
  <g transform="translate(470,430)">
    <rect x="2" y="6" width="230" height="84" rx="14" fill="#1F2328" opacity="0.04"/>
    <rect x="1" y="3" width="230" height="84" rx="14" fill="#1F2328" opacity="0.05"/>
    <rect class="s" x="0.75" y="0.75" width="228.5" height="82.5" rx="14" fill="#FFFFFF" stroke="#1F2328" stroke-width="2.25"/>
    <!-- single-line capsule glyph -->
    <g class="s" stroke-width="1.5" transform="translate(15,14)">
      <rect x="0" y="-5" width="24" height="11" rx="5.5"/>
      <line x1="12" y1="-5" x2="12" y2="6"/>
    </g>
    <text x="115" y="26" text-anchor="middle" class="sans num" font-size="14"><tspan class="mono">&#8804; 3 g / day</tspan></text>
    <text x="115" y="48" text-anchor="middle" class="sans ns" font-size="11.5"><tspan class="mono">15 mg/kg/dose</tspan> if</text>
    <text x="115" y="65" text-anchor="middle" class="sans ns" font-size="11.5">body weight &lt; 50 kg</text>
  </g>

  <!-- Leaf3 (No -> standard, recommended; confirmed/ok sage leaf; ℞ dose glyph; floats) -->
  <g transform="translate(760,430)">
    <rect x="2" y="6" width="240" height="84" rx="14" fill="#1F2328" opacity="0.04"/>
    <rect x="1" y="3" width="240" height="84" rx="14" fill="#1F2328" opacity="0.05"/>
    <rect x="0.75" y="0.75" width="238.5" height="82.5" rx="14" fill="#E0E9DC" fill-opacity="0.85" stroke="#5E7E5A" stroke-width="2.25" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
    <!-- ℞ dose glyph (serif) -->
    <text x="14" y="32" class="serif" fill="#5E7E5A" font-size="20" font-weight="700">&#8478;</text>
    <!-- bespoke single-line check glyph (confirmed) -->
    <path class="s" style="stroke:#5E7E5A" stroke-width="1.6" d="M210,16 l6,6 l11,-13"/>
    <text x="124" y="26" text-anchor="middle" class="sans num" font-size="14"><tspan class="mono">1 g every 6 h</tspan></text>
    <text x="124" y="48" text-anchor="middle" class="sans ns" font-size="11.5">max <tspan class="mono">4 g / day</tspan></text>
    <text x="124" y="65" text-anchor="middle" class="sans ns" font-size="11.5">standard healthy adult</text>
  </g>

  </g>

  <!-- legend: model tiers as line-style (solid / double / triple), not color -->
  <g transform="translate(44,576)">
    <g class="s" stroke="#1F2328" stroke-width="1.5">
      <line x1="0" y1="-4" x2="22" y2="-4"/>
    </g>
    <text x="28" y="0" class="sans muted" font-size="10.5">Haiku</text>
    <g class="s" stroke="#1F2328" stroke-width="1.5" transform="translate(78,0)">
      <line x1="0" y1="-7" x2="22" y2="-7"/>
      <line x1="0" y1="-1" x2="22" y2="-1"/>
    </g>
    <text x="106" y="0" class="sans muted" font-size="10.5">Sonnet</text>
    <g class="s" stroke="#1F2328" stroke-width="1.5" transform="translate(160,0)">
      <line x1="0" y1="-9" x2="22" y2="-9"/>
      <line x1="0" y1="-4" x2="22" y2="-4"/>
      <line x1="0" y1="1" x2="22" y2="1"/>
    </g>
    <text x="188" y="0" class="sans muted" font-size="10.5">Opus</text>
  </g>

  <!-- footer -->
  <text x="252" y="600" class="sans muted" font-size="12.5">Every leaf is grounded in cited guidelines; the Trust agent scores the path before it is shown. Branches and thresholds are produced per query, not hard-coded.</text>
</svg>
