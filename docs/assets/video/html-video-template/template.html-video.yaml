spec_version: 1
id: frame-cerebralink
name: CerebraLink Pipeline
description: >
  CerebraLink multi-agent clinical pipeline reveal — Route, Fetch, Council,
  Compose, Score — with a fast-answer callout.

engine: hyperframes
engine_version: ^0.4.0
source_entry: index.html

category: explainer
subcategory: product
tags: [explainer, product, pipeline, medical-ai, agents]

best_for:
  - "Product intro"
  - "Pipeline explainer"

output:
  formats: [mp4, webm]
  default_format: mp4
  resolution:
    default: { width: 1920, height: 1080 }
    supported_aspects: ["16:9"]
  fps:
    default: 30
    supported: [30, 60]
  duration:
    type: fixed
    default_sec: 10
  alpha: false
  audio: { supported: false }

inputs:
  schema:
    type: object
    properties: {}
  examples: []

license:
  spdx: Apache-2.0
  attribution_required: false
  redistribution_allowed: true
  commercial_use: true
  notes: "Original CerebraLink composition."

author:
  name: "Ariorad Moniri / CerebraLink"
  url: "https://github.com/ArioMoniri/cerebralink"

version: "0.1.0"

preview:
  poster: poster.svg
