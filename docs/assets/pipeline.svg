<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="CerebraLink SSE streaming timeline">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#0a0e28"/><stop offset="100%" stop-color="#160a2e"/></linearGradient>
    <linearGradient id="rail" gradientUnits="userSpaceOnUse" x1="70" y1="0" x2="1130" y2="0">
      <stop offset="0%" stop-color="#0e7490"/><stop offset="40%" stop-color="#4f46e5"/><stop offset="72%" stop-color="#9333ea"/><stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <style>
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
      .ttl{font-weight:800;fill:#e2e8f0}.tag{fill:#94a3b8;font-size:12px}.lbl{font-size:13px;font-weight:700}
      @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
      .m{transform-box:fill-box;transform-origin:center}
      .m1{animation:pulse 2.6s ease-in-out infinite}.m2{animation:pulse 2.6s ease-in-out infinite .3s}
      .m3{animation:pulse 2.6s ease-in-out infinite .6s}.m4{animation:pulse 2.6s ease-in-out infinite .9s}
      .m5{animation:pulse 2.6s ease-in-out infinite 1.2s}.m6{animation:pulse 2.6s ease-in-out infinite 1.5s}
    </style>
  </defs>

  <rect width="1200" height="400" rx="20" fill="url(#pbg)"/>
  <text x="40" y="48" class="ttl" font-size="24">⚡ One Question → A Live Stream of Events</text>
  <text x="40" y="74" class="tag" font-size="14">The browser opens a single POST to <tspan fill="#7dd3fc">/api/chat/stream</tspan> and receives Server-Sent Events as each agent finishes.</text>

  <!-- motion path for packets (invisible) -->
  <path id="track" d="M70,150 H1130" fill="none" stroke="none"/>

  <!-- rail base + animated flow -->
  <line x1="70" y1="150" x2="1130" y2="150" stroke="#1e293b" stroke-width="6" stroke-linecap="round"/>
  <line x1="70" y1="150" x2="1130" y2="150" stroke="url(#rail)" stroke-width="6" stroke-linecap="round" stroke-dasharray="14 10" opacity="0.9">
    <animate attributeName="stroke-dashoffset" from="0" to="-48" dur="1.1s" repeatCount="indefinite"/>
  </line>

  <!-- traveling packets -->
  <g>
    <circle r="6" fill="#5eead4"><animateMotion dur="3.4s" repeatCount="indefinite"><mpath href="#track"/></animateMotion><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle r="5" fill="#a5b4fc"><animateMotion dur="3.4s" begin="1.1s" repeatCount="indefinite"><mpath href="#track"/></animateMotion><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="3.4s" begin="1.1s" repeatCount="indefinite"/></circle>
    <circle r="5" fill="#d8b4fe"><animateMotion dur="3.4s" begin="2.2s" repeatCount="indefinite"><mpath href="#track"/></animateMotion><animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.95;1" dur="3.4s" begin="2.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- event markers -->
  <g transform="translate(70,150)">  <g class="m m1"><circle r="11" fill="#0e7490"/><circle r="4" fill="#a5f3fc"/></g><text y="-26" text-anchor="middle" class="lbl" fill="#67e8f9">status</text><text y="42" text-anchor="middle" class="tag">router</text></g>
  <g transform="translate(280,150)"> <g class="m m2"><circle r="11" fill="#0e7490"/><circle r="4" fill="#a5f3fc"/></g><text y="-26" text-anchor="middle" class="lbl" fill="#67e8f9">status ×N</text><text y="42" text-anchor="middle" class="tag">fetch + council</text></g>
  <g transform="translate(520,150)"> <g class="m m3"><circle r="14" fill="#4f46e5"/><circle r="5" fill="#c7d2fe"/></g><text y="-26" text-anchor="middle" class="lbl" fill="#a5b4fc">fast_answer</text><text y="46" text-anchor="middle" class="tag">~1–2 s · partial</text></g>
  <g transform="translate(740,150)"> <g class="m m4"><circle r="11" fill="#4f46e5"/><circle r="4" fill="#c7d2fe"/></g><text y="-26" text-anchor="middle" class="lbl" fill="#a5b4fc">status</text><text y="42" text-anchor="middle" class="tag">full composer</text></g>
  <g transform="translate(960,150)"> <g class="m m5"><circle r="14" fill="#9333ea"/><circle r="5" fill="#e9d5ff"/></g><text y="-26" text-anchor="middle" class="lbl" fill="#d8b4fe">result</text><text y="46" text-anchor="middle" class="tag">full + trust + citations</text></g>
  <g transform="translate(1130,150)"><g class="m m6"><circle r="11" fill="#0d9488"/><circle r="4" fill="#99f6e4"/></g><text y="-26" text-anchor="middle" class="lbl" fill="#5eead4">done</text><text y="42" text-anchor="middle" class="tag">close</text></g>

  <!-- info box -->
  <g transform="translate(40,250)">
    <rect width="1120" height="92" rx="14" fill="#0f172a" stroke="#334155"/>
    <text x="20" y="30" class="tag" fill="#7dd3fc" font-weight="700">WHY STREAM?</text>
    <text x="20" y="54" class="tag" font-size="13">• The full multi-agent pipeline can take 1–3 minutes — but the <tspan fill="#a5b4fc">fast_answer</tspan> reaches the clinician in ~1–2 seconds.</text>
    <text x="20" y="74" class="tag" font-size="13">• A Next.js route handler proxies the stream and injects <tspan fill="#5eead4">:keepalive</tspan> comments every 15 s so reverse proxies / tunnels don't drop the idle connection.</text>
  </g>
</svg>
