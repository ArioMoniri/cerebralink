<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="CerebraLink — Multi-Agent Clinical Decision Support">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e28"/>
      <stop offset="55%" stop-color="#0d1230"/>
      <stop offset="100%" stop-color="#160a2e"/>
    </linearGradient>
    <linearGradient id="title" gradientUnits="userSpaceOnUse" x1="500" y1="0" x2="930" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="45%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-160 0; 160 0; -160 0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.5"/><stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.42"/><stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
    <style>
      text{font-family:'Segoe UI',Helvetica,Arial,sans-serif}
      @keyframes breathe{0%,100%{opacity:.5}50%{opacity:.95}}
      @keyframes rise{0%{transform:translateY(0);opacity:0}15%{opacity:.9}85%{opacity:.9}100%{transform:translateY(-120px);opacity:0}}
      .glowA{animation:breathe 7s ease-in-out infinite}
      .glowB{animation:breathe 7s ease-in-out infinite 2.5s}
      .p{animation:rise 9s linear infinite}
      .p2{animation:rise 11s linear infinite 2s}.p3{animation:rise 8s linear infinite 4s}
      .p4{animation:rise 12s linear infinite 1s}.p5{animation:rise 10s linear infinite 6s}
    </style>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <ellipse class="glowA" cx="250" cy="180" rx="300" ry="220" fill="url(#glowA)" filter="url(#blur)"/>
  <ellipse class="glowB" cx="940" cy="120" rx="260" ry="180" fill="url(#glowB)" filter="url(#blur)"/>

  <!-- floating particles -->
  <g fill="#a5b4fc">
    <circle class="p"  cx="120" cy="320" r="2.5" opacity="0"/>
    <circle class="p2" cx="300" cy="330" r="2"   opacity="0" fill="#5eead4"/>
    <circle class="p3" cx="430" cy="320" r="2.5" opacity="0" fill="#c084fc"/>
    <circle class="p4" cx="60"  cy="330" r="2"   opacity="0"/>
    <circle class="p5" cx="220" cy="330" r="3"   opacity="0" fill="#5eead4"/>
  </g>

  <!-- ── neural network (left) ── -->
  <g transform="translate(70,180)">
    <!-- edges -->
    <g stroke-width="1.4" fill="none" opacity="0.45">
      <path id="e1" d="M20,-90 L130,-40"  stroke="#5eead4"/>
      <path id="e2" d="M20,0   L130,-40"  stroke="#5eead4"/>
      <path id="e3" d="M20,0   L130,55"   stroke="#818cf8"/>
      <path id="e4" d="M20,90  L130,55"   stroke="#818cf8"/>
      <path id="e5" d="M130,-40 L250,-70" stroke="#818cf8"/>
      <path id="e6" d="M130,-40 L250,20"  stroke="#818cf8"/>
      <path id="e7" d="M130,55  L250,20"  stroke="#c084fc"/>
      <path id="e8" d="M130,55  L250,90"  stroke="#c084fc"/>
      <path id="e9" d="M250,-70 L360,10"  stroke="#c084fc"/>
      <path id="e10" d="M250,20 L360,10"  stroke="#c084fc"/>
      <path id="e11" d="M250,90 L360,10"  stroke="#5eead4"/>
    </g>
    <!-- signal dots traveling along edges -->
    <g fill="#e0f2fe">
      <circle r="3.2"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#e2"/></animateMotion></circle>
      <circle r="3.2" fill="#99f6e4"><animateMotion dur="2.6s" repeatCount="indefinite" begin="0.4s"><mpath href="#e6"/></animateMotion></circle>
      <circle r="3.2" fill="#d8b4fe"><animateMotion dur="2.4s" repeatCount="indefinite" begin="0.9s"><mpath href="#e9"/></animateMotion></circle>
      <circle r="3.2" fill="#a5b4fc"><animateMotion dur="2.8s" repeatCount="indefinite" begin="1.3s"><mpath href="#e7"/></animateMotion></circle>
    </g>
    <!-- nodes -->
    <g>
      <circle cx="20"  cy="-90" r="8" fill="#5eead4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="20"  cy="0"   r="9" fill="#5eead4"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="20"  cy="90"  r="8" fill="#5eead4"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="130" cy="-40" r="9" fill="#818cf8"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="130" cy="55"  r="9" fill="#818cf8"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="250" cy="-70" r="8" fill="#a78bfa"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="250" cy="20"  r="9" fill="#a78bfa"><animate attributeName="opacity" values="0.6;1;0.6" dur="3s" begin="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="250" cy="90"  r="8" fill="#a78bfa"><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="2.1s" repeatCount="indefinite"/></circle>
      <circle cx="360" cy="10"  r="11" fill="#c084fc"><animate attributeName="r" values="11;13;11" dur="2.6s" repeatCount="indefinite"/></circle>
    </g>
  </g>

  <!-- ── wordmark ── -->
  <text x="500" y="150" font-size="78" font-weight="800" fill="url(#title)">CerebraLink</text>
  <text x="503" y="198" font-size="26" font-weight="500" fill="#cbd5e1">Multi-Agent Clinical Decision Support</text>
  <text x="503" y="238" font-size="17" fill="#94a3b8">🧠 7 specialized agents &#160;·&#160; ⚡ streaming answers &#160;·&#160; 🔬 cited evidence &#160;·&#160; 🩺 EHR-aware</text>

  <!-- pills -->
  <g font-size="14" font-weight="600">
    <g transform="translate(503,266)">
      <rect width="124" height="30" rx="15" fill="#5eead4" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.5"/>
      <text x="62" y="20" text-anchor="middle" fill="#5eead4">Claude · FastAPI</text>
    </g>
    <g transform="translate(639,266)">
      <rect width="110" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.5"/>
      <text x="55" y="20" text-anchor="middle" fill="#a5b4fc">Next.js · SSE</text>
    </g>
    <g transform="translate(761,266)">
      <rect width="124" height="30" rx="15" fill="#c084fc" fill-opacity="0.12" stroke="#c084fc" stroke-opacity="0.5"/>
      <text x="62" y="20" text-anchor="middle" fill="#c084fc">Neo4j · Redis · MCP</text>
    </g>
  </g>
</svg>
