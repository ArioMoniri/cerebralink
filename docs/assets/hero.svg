<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 424" width="1200" height="424" role="img" aria-label="CerebraLink — Multi-Agent Clinical Decision Support">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:'Segoe UI',-apple-system,Helvetica,Arial,sans-serif}
      .mono{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace}
      .ink{fill:#1F2328}
      .muted{fill:#6B6A66}
      .s{fill:none;stroke:#1F2328;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .hair{fill:none;stroke:#CFC7B6;stroke-width:1;vector-effect:non-scaling-stroke}
      @keyframes trace{from{stroke-dashoffset:500}to{stroke-dashoffset:0}}
      .pulse{stroke-dasharray:500;stroke-dashoffset:0;animation:trace 6s ease-in-out infinite}
    </style>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <circle cx="0.6" cy="0.6" r="0.3" fill="#1F2328" fill-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- warm paper ground + grain + one soft rounded frame -->
  <rect x="0" y="0" width="1200" height="424" fill="#FBF8F1"/>
  <rect x="0" y="0" width="1200" height="424" fill="url(#grain)"/>
  <rect x="16.5" y="16.5" width="1167" height="391" rx="18" fill="none" stroke="#E3DDD0"/>

  <!-- ===== MASTHEAD ===== -->
  <text x="600" y="62" text-anchor="middle" class="sans muted" font-size="12.5" letter-spacing="4.5">OPEN&#8201;SOURCE&#160;&#160;&#183;&#160;&#160;MULTI-AGENT&#160;&#160;&#183;&#160;&#160;CLINICAL DECISION SUPPORT</text>
  <line class="hair" x1="430" y1="82" x2="770" y2="82"/>

  <!-- ===== TITLE ===== -->
  <text x="600" y="184" text-anchor="middle" class="serif ink" font-size="100" font-weight="700" letter-spacing="-1.5">CerebraLink</text>

  <!-- ECG divider — the one rationed teal accent; static base + draw-on pulse -->
  <g transform="translate(0,212)">
    <path class="s" stroke="#1F2328" stroke-width="1.25" stroke-opacity="0.26" d="M438,0 H548 l9,0 6,-15 9,30 6,-15 H638 l8,0 6,-34 10,58 7,-40 5,16 H762"/>
    <path class="s pulse" style="stroke:#0E7C86" stroke-width="2.25" d="M438,0 H548 l9,0 6,-15 9,30 6,-15 H638 l8,0 6,-34 10,58 7,-40 5,16 H762"/>
    <circle cx="670" cy="-16" r="3.2" fill="#0E7C86"/>
  </g>

  <!-- ===== LEDE (serif italic) ===== -->
  <text x="600" y="262" text-anchor="middle" class="serif ink" font-size="25" font-style="italic">Reads the chart. Cites the guideline. Calculates the dose.</text>

  <!-- coverline (mono small-caps) -->
  <text x="600" y="298" text-anchor="middle" class="mono muted" font-size="13" letter-spacing="1.3"><tspan fill="#0E7C86" font-weight="700">~10 s</tspan> first answer&#160;&#160;&#183;&#160;&#160;guideline dosing &amp; Rx&#160;&#160;&#183;&#160;&#160;cited&#160;&#160;&#183;&#160;&#160;trust-scored&#160;&#160;&#183;&#160;&#160;FHIR&#160;&#183;&#160;HL7</text>

  <!-- ===== MEDICAL FRIEZE ===== refined single-line clinical glyphs, generous bottom margin -->
  <line class="hair" x1="470" y1="332" x2="730" y2="332"/>
  <g transform="translate(0,366)" class="s" stroke="#1F2328" stroke-width="1.8">
    <!-- stethoscope: reads -->
    <g transform="translate(456,-6)">
      <path d="M-11,-11 C-11,1 -4,7 0,7 C4,7 11,1 11,-11"/>
      <circle cx="-11" cy="-12" r="1.5" fill="#1F2328" stroke="none"/>
      <circle cx="11" cy="-12" r="1.5" fill="#1F2328" stroke="none"/>
      <path d="M0,7 C0,14 8,16 8,10"/>
      <circle cx="8" cy="8" r="3"/>
    </g>
    <!-- Rx: prescribes (serif glyph) -->
    <text x="600" y="2" text-anchor="middle" class="serif ink" font-size="24" font-weight="700" stroke="none">&#8478;</text>
    <!-- pulse-in-shield: trust-scores -->
    <g transform="translate(744,-5)">
      <path d="M0,-12 L10,-8 L10,0 C10,8 5,12 0,14 C-5,12 -10,8 -10,0 L-10,-8 Z"/>
      <path style="stroke:#0E7C86" stroke-width="1.7" d="M-6,0 H-2.5 l1.8,-4 2.7,8 1.8,-4 H6"/>
    </g>
  </g>
  <g class="sans muted" font-size="9.5" letter-spacing="1.5" text-anchor="middle">
    <text x="456" y="390">READS</text>
    <text x="600" y="390">PRESCRIBES</text>
    <text x="744" y="390">TRUST-SCORES</text>
  </g>
</svg>
