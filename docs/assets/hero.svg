<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="CerebraLink — Multi-Agent Clinical Decision Support">
  <defs>
    <style>
      text{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:'Segoe UI',-apple-system,Helvetica,Arial,sans-serif}
      .mono{font-family:'SFMono-Regular',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace}
      .s{fill:none;stroke:#1F2328;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      @keyframes draw{from{stroke-dashoffset:760}to{stroke-dashoffset:0}}
      @keyframes beat{0%,62%,100%{transform:scale(1);opacity:.55}70%{transform:scale(1.5);opacity:1}}
      .ekg{stroke-dasharray:760;stroke-dashoffset:0;animation:draw 5.5s ease-in-out infinite}
      .qrs{transform-box:fill-box;transform-origin:center;animation:beat 5.5s ease-in-out infinite}
    </style>
  </defs>

  <!-- paper card + hairline -->
  <rect x="0.5" y="0.5" width="1199" height="359" rx="20" fill="#FBF8F1" stroke="#E3DDD0"/>

  <!-- brain-as-network mark (single ink contour; gyri double as edges) -->
  <g transform="translate(600,88)">
    <!-- outer brain contour, hand-drawn (two faint passes) -->
    <path class="s" stroke-width="2.25" d="M-34,2 C-40,-22 -20,-36 -2,-33 C7,-44 30,-42 35,-24 C46,-22 47,-2 38,7 C44,18 30,32 14,29 C6,38 -14,38 -22,28 C-38,28 -44,12 -34,2 Z"/>
    <path class="s" stroke-width="1" stroke-opacity="0.4" d="M-33,4 C-39,-20 -19,-34 -1,-31 C8,-42 31,-40 36,-22 C47,-20 46,0 37,9"/>
    <!-- inner gyri = graph edges -->
    <path class="s" stroke-width="1.5" d="M-18,-14 C-6,-20 6,-6 18,-12"/>
    <path class="s" stroke-width="1.5" d="M-20,6 C-4,2 4,14 20,8"/>
    <path class="s" stroke-width="1.5" d="M-2,-31 C2,-14 -4,2 2,28"/>
    <!-- nodes -->
    <circle cx="-18" cy="-14" r="3.4" fill="#1F2328"/>
    <circle cx="18" cy="-12" r="3.4" fill="#1F2328"/>
    <circle cx="-20" cy="6" r="3.4" fill="#1F2328"/>
    <circle cx="20" cy="8" r="3.4" fill="#1F2328"/>
    <!-- one accent synapse -->
    <circle class="qrs" cx="2" cy="-2" r="4.4" fill="#0E7C86"/>
  </g>

  <!-- wordmark (serif ink) -->
  <text x="600" y="208" text-anchor="middle" font-size="66" font-weight="700" letter-spacing="-0.5" fill="#1F2328">CerebraLink</text>
  <!-- accent tick under "Link" (only color in the logo) -->
  <path class="s" stroke="#0E7C86" stroke-width="2.5" d="M656,222 C690,219 726,219 744,222"/>

  <!-- EKG trace draws left→right; teal pulse at the QRS peak -->
  <path class="s ekg" stroke-width="1.5" d="M360,256 H520 l9,0 l5,-9 6,15 5,-6 H556 l7,0 l5,-30 9,52 6,-40 5,18 H612 q16,-9 30,0 H840"/>
  <circle class="qrs" cx="571" cy="226" r="3.6" fill="#0E7C86"/>

  <!-- subtitle -->
  <text x="600" y="296" text-anchor="middle" class="sans" font-size="21" font-weight="500" fill="#6B6A66">Multi-Agent Clinical Decision Support</text>

  <!-- capability line: no emoji; latencies/codes in mono -->
  <text x="600" y="330" text-anchor="middle" class="sans" font-size="15" fill="#6B6A66"><tspan class="mono" fill="#0E7C86">~10 s</tspan> first answer&#160;&#160;·&#160;&#160;guideline dosing &amp; prescriptions&#160;&#160;·&#160;&#160;cited&#160;&#160;·&#160;&#160;trust-scored&#160;&#160;·&#160;&#160;<tspan class="mono">FHIR</tspan> · <tspan class="mono">HL7</tspan></text>
</svg>
