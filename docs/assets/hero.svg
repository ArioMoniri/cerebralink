<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 412" width="1200" height="412" role="img" aria-label="CerebraLink — Multi-Agent Clinical Decision Support">
  <defs>
    <style>
      .serif{font-family:Georgia,'Times New Roman',serif}
      .sans{font-family:'Segoe UI',-apple-system,Helvetica,Arial,sans-serif}
      .mono{font-family:'SFMono-Regular',ui-monospace,Menlo,Consolas,monospace}
      .ink{fill:#1F2328}
      .muted{fill:#6B6A66}
      .s{fill:none;stroke:#1F2328;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
      .hair{fill:none;stroke:#CFC7B6;stroke-width:1;vector-effect:non-scaling-stroke}
      @keyframes trace{from{stroke-dashoffset:300}to{stroke-dashoffset:0}}
      .pulse{stroke-dasharray:300;stroke-dashoffset:0;animation:trace 6s ease-in-out infinite}
    </style>
    <pattern id="grain" width="3" height="3" patternUnits="userSpaceOnUse" patternTransform="rotate(8)">
      <circle cx="0.6" cy="0.6" r="0.32" fill="#1F2328" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <!-- warm paper ground + grain + editorial double frame -->
  <rect x="0" y="0" width="1200" height="412" fill="#FBF8F1"/>
  <rect x="0" y="0" width="1200" height="412" fill="url(#grain)"/>
  <rect x="14.5" y="14.5" width="1171" height="383" fill="none" stroke="#E3DDD0"/>
  <rect x="20.5" y="20.5" width="1159" height="371" fill="none" stroke="#E8E2D5"/>

  <!-- ===== MASTHEAD ===== -->
  <text x="600" y="58" text-anchor="middle" class="sans muted" font-size="12.5" letter-spacing="4.5">OPEN&#8201;SOURCE&#160;&#183;&#160;MULTI-AGENT&#160;&#183;&#160;CLINICAL DECISION SUPPORT</text>
  <line class="hair" x1="150" y1="78" x2="1050" y2="78"/>
  <line class="hair" x1="150" y1="82" x2="1050" y2="82"/>
  <!-- folio flourishes -->
  <text x="150" y="58" class="mono muted" font-size="11">EST. 2026</text>
  <text x="1050" y="58" text-anchor="end" class="mono muted" font-size="11">Apache&#8201;2.0</text>

  <!-- ===== TITLE ===== -->
  <text x="600" y="186" text-anchor="middle" class="serif ink" font-size="104" font-weight="700" letter-spacing="-1.5">CerebraLink</text>

  <!-- ECG divider — the one rationed teal accent; static base + draw-on pulse -->
  <g transform="translate(0,214)">
    <path class="s" stroke="#1F2328" stroke-width="1.25" stroke-opacity="0.28" d="M430,0 H545 l9,0 6,-15 9,30 6,-15 H636 l8,0 6,-34 10,58 7,-40 5,16 H770"/>
    <path class="s pulse" stroke="#0E7C86" stroke-width="2.25" d="M430,0 H545 l9,0 6,-15 9,30 6,-15 H636 l8,0 6,-34 10,58 7,-40 5,16 H770"/>
    <circle cx="668" cy="-16" r="3.4" fill="#0E7C86"/>
  </g>

  <!-- ===== LEDE (serif italic) ===== -->
  <text x="600" y="264" text-anchor="middle" class="serif ink" font-size="25" font-style="italic">Reads the chart. Cites the guideline. Calculates the dose.</text>

  <!-- coverline (mono small-caps) -->
  <text x="600" y="298" text-anchor="middle" class="mono muted" font-size="13" letter-spacing="1.5"><tspan fill="#0E7C86" font-weight="700">~10 s</tspan> first answer&#160;&#160;&#183;&#160;&#160;guideline dosing &amp; Rx&#160;&#160;&#183;&#160;&#160;cited&#160;&#160;&#183;&#160;&#160;trust-scored&#160;&#160;&#183;&#160;&#160;FHIR&#160;&#183;&#160;HL7</text>

  <!-- ===== MEDICAL FRIEZE ===== refined single-line clinical glyphs -->
  <line class="hair" x1="380" y1="330" x2="820" y2="330"/>
  <g transform="translate(0,366)" class="s" stroke="#1F2328" stroke-width="1.8">
    <!-- stethoscope: reads -->
    <g transform="translate(440,-8)">
      <path d="M-12,-12 C-12,2 -4,8 0,8 C4,8 12,2 12,-12"/>
      <circle cx="-12" cy="-13" r="1.6" fill="#1F2328" stroke="none"/>
      <circle cx="12" cy="-13" r="1.6" fill="#1F2328" stroke="none"/>
      <path d="M0,8 C0,16 9,18 9,11"/>
      <circle cx="9" cy="9" r="3.4"/>
    </g>
    <!-- Rx: prescribes (serif glyph) -->
    <text x="600" y="2" text-anchor="middle" class="serif ink" font-size="26" font-weight="700" stroke="none">&#8478;</text>
    <!-- pulse-in-shield: trust-scores -->
    <g transform="translate(760,-6)">
      <path d="M0,-13 L11,-9 L11,1 C11,9 5,13 0,15 C-5,13 -11,9 -11,1 L-11,-9 Z"/>
      <path stroke="#0E7C86" stroke-width="1.8" d="M-7,1 H-3 l2,-5 3,9 2,-4 H7"/>
    </g>
  </g>
  <g class="sans muted" font-size="9.5" letter-spacing="1.5" text-anchor="middle">
    <text x="440" y="392">READS</text>
    <text x="600" y="392">PRESCRIBES</text>
    <text x="760" y="392">TRUST-SCORES</text>
  </g>
</svg>
