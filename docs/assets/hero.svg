<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="CerebraLink — Multi-Agent Clinical Decision Support">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f2a"/>
      <stop offset="50%" stop-color="#0d1230"/>
      <stop offset="100%" stop-color="#10082a"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5eead4"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="3"/></filter>
    <style>
      @keyframes pulse  { 0%,100%{opacity:.35;r:5} 50%{opacity:1;r:8} }
      @keyframes flow   { to { stroke-dashoffset:-40 } }
      @keyframes drift  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes shimmer{ 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
      .node   { animation: pulse 3s ease-in-out infinite; }
      .n2{animation-delay:.4s}.n3{animation-delay:.8s}.n4{animation-delay:1.2s}
      .n5{animation-delay:1.6s}.n6{animation-delay:2s}.n7{animation-delay:2.4s}
      .edge   { stroke-dasharray:6 6; animation: flow 1.6s linear infinite; }
      .float  { animation: drift 6s ease-in-out infinite; }
      .tag    { animation: shimmer 4s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="1200" height="340" rx="24" fill="url(#bg)"/>
  <ellipse cx="270" cy="170" rx="240" ry="170" fill="url(#glow)"/>

  <!-- neural cluster -->
  <g class="float" transform="translate(180,170)" fill="none">
    <g stroke="#5eead4" stroke-opacity="0.5" stroke-width="1.5">
      <line class="edge" x1="0" y1="0" x2="90" y2="-60"/>
      <line class="edge" x1="0" y1="0" x2="100" y2="10"/>
      <line class="edge" x1="0" y1="0" x2="80" y2="70"/>
      <line class="edge" x1="90" y1="-60" x2="180" y2="-30"/>
      <line class="edge" x1="100" y1="10" x2="180" y2="-30"/>
      <line class="edge" x1="100" y1="10" x2="170" y2="60"/>
      <line class="edge" x1="80" y1="70" x2="170" y2="60"/>
      <line class="edge" x1="-90" y1="-40" x2="0" y2="0"/>
      <line class="edge" x1="-80" y1="55" x2="0" y2="0"/>
    </g>
    <g fill="#a5b4fc">
      <circle class="node"    cx="0"   cy="0"   r="9"/>
      <circle class="node n2" cx="90"  cy="-60" r="6"/>
      <circle class="node n3" cx="100" cy="10"  r="6"/>
      <circle class="node n4" cx="80"  cy="70"  r="6"/>
      <circle class="node n5" cx="180" cy="-30" r="7" fill="#5eead4"/>
      <circle class="node n6" cx="170" cy="60"  r="7" fill="#c084fc"/>
      <circle class="node n7" cx="-90" cy="-40" r="6" fill="#5eead4"/>
      <circle class="node n3" cx="-80" cy="55"  r="6" fill="#c084fc"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="500" y="158" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="74" font-weight="800" fill="url(#title)">CerebraLink</text>
  <text x="502" y="206" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#cbd5e1">Multi-Agent Clinical Decision Support</text>
  <g class="tag" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#94a3b8">
    <text x="502" y="246">🧠 7 specialized agents &#160;·&#160; ⚡ streaming answers &#160;·&#160; 🔬 cited evidence &#160;·&#160; 🩺 EHR-aware</text>
  </g>

  <!-- pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <g transform="translate(502,272)">
      <rect width="118" height="30" rx="15" fill="#5eead4" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.5"/>
      <text x="59" y="20" text-anchor="middle" fill="#5eead4">Claude · FastAPI</text>
    </g>
    <g transform="translate(632,272)">
      <rect width="104" height="30" rx="15" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.5"/>
      <text x="52" y="20" text-anchor="middle" fill="#a5b4fc">Next.js · SSE</text>
    </g>
    <g transform="translate(748,272)">
      <rect width="118" height="30" rx="15" fill="#c084fc" fill-opacity="0.12" stroke="#c084fc" stroke-opacity="0.5"/>
      <text x="59" y="20" text-anchor="middle" fill="#c084fc">Neo4j · Redis · MCP</text>
    </g>
  </g>
</svg>
